// The regression corpus ships in the repository as payload-stripped archives, so
// `./gradlew regressionTest` needs no download and no configuration. See CONTRIBUTING.md.
tasks.register('unpackCorpus', Sync) {
    description = 'Unpacks the bundled regression corpus into the build directory'
    from zipTree(layout.projectDirectory.file('src/regressionTest/corpus/corpus.zip'))
    into layout.buildDirectory.dir('regressionCorpus')
}

// Regenerates that bundled corpus from a payload-bearing one: every byte the parser never
// reads is zeroed. Maintenance-only; see CONTRIBUTING.md for the verification procedure.
tasks.register('stripCorpus', JavaExec) {
    description = 'Zero every archive byte the parser never reads, from -PcorpusIn into -PcorpusOut'
    group = 'verification'
    classpath = sourceSets.regressionTest.runtimeClasspath
    mainClass = 'com.github.junrar.regression.CorpusStripper'
    args = [findProperty('corpusIn') ?: '', findProperty('corpusOut') ?: '']
}

jacocoTestReport {
    reports {
        xml.required.set(true)
        html.required.set(false)
    }
}

def isNonStable = { String version ->
    def stableKeyword = ['RELEASE', 'FINAL', 'GA'].any { it -> version.toUpperCase().contains(it) }
    def regex = /^[0-9,.v-]+(-r)?$/
    return !stableKeyword && !(version ==~ regex)
}
tasks.named("dependencyUpdates").configure {
    // disallow release candidates as upgradable versions from stable versions
    rejectVersionIf {
        isNonStable(it.candidate.version) && !isNonStable(it.currentVersion)
    }
}

def ppmHeapGolden = file('src/test/resources/com/github/junrar/ppm/legit-maxmb63-heap.gz')

tasks.named('test', Test).configure {
    useJUnitPlatform {
        excludeTags 'generate', 'bigdict'
    }
}

tasks.register('bigDictTest', Test) {
    description = 'Extracts the > 4 GB-dictionary RAR7 fixture through the segmented window ' +
        '(M4.3). Local/scheduled only -- never a PR gate: it unpacks 4.25 GB and needs the heap ' +
        'below plus maxDictionarySize raised past 6 GB in the test itself.'
    group = 'verification'
    dependsOn testClasses
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    maxHeapSize = '6g'
    filter {
        includeTestsMatching 'com.github.junrar.ArchiveRar7BigDictTest'
    }
    useJUnitPlatform {
        includeTags 'bigdict'
    }
}

tasks.register('ppmHeapDumpTest', Test) {
    description = 'Checks two PPMd heap dumps against the committed golden.'
    group = 'verification'
    dependsOn testClasses
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    filter {
        includeTestsMatching 'com.github.junrar.PpmHeapDumpTest'
    }
    useJUnitPlatform {
        includeTags 'check'
    }
}

tasks.register('generatePpmHeapDump', Test) {
    description = 'Regenerates the committed PPMd heap golden from its fixture.'
    group = 'verification'
    dependsOn testClasses
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    systemProperty 'ppm.heap.golden', ppmHeapGolden.absolutePath
    filter {
        includeTestsMatching 'com.github.junrar.PpmHeapDumpTest'
    }
    useJUnitPlatform {
        includeTags 'generate'
    }
}
