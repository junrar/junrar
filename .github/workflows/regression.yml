name: Regression Test

on:
  pull_request:
  push:
    branches-ignore:
      - 'dependabot/**'

jobs:
  regression:
    name: Regression test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          java-package: 'jdk'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # The corpus ships in the repository as payload-stripped archives, so there is
      # nothing to download and nothing to configure. See CONTRIBUTING.md.
      - name: Regression test
        id: regression
        run: ./gradlew regressionTest

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: regression-test-results
          path: build/test-results/
