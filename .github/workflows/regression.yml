name: Regression Test

on:
  pull_request:
  push:
    branches-ignore:
      - 'dependabot/**'

jobs:
  regression:
    name: Regression test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Corpus is a ~7 GB public Google Drive file. Cache the downloaded zip so the
      # download only runs on a cache miss (bump the key suffix to force a refresh).
      - name: Cache corpus
        id: corpus-cache
        uses: actions/cache@v4
        with:
          path: rar-corpus.zip
          key: rar-corpus-v1-1BvUT1jDkXon9-uqu2-QhBHjOthWcCL8G

      - name: Download corpus
        if: steps.corpus-cache.outputs.cache-hit != 'true'
        run: |
          python3 -m pip install --user --quiet gdown
          python3 - <<'PY'
          import sys
          import time

          import gdown

          # Google Drive rate-limits/quota errors are transient more often than not;
          # retry before failing the job. Persistent quota exhaustion still fails.
          for attempt in range(3):
              out = None
              try:
                  out = gdown.download(
                      "https://drive.google.com/uc?id=1BvUT1jDkXon9-uqu2-QhBHjOthWcCL8G",
                      "rar-corpus.zip",
                      quiet=False,
                  )
              except Exception as e:
                  print("corpus download raised: %s" % e, file=sys.stderr)
              if out is not None:
                  break
              if attempt < 2:
                  time.sleep(60 * (attempt + 1))
          else:
              sys.exit("corpus download failed after 3 attempts")
          PY

      - name: Unzip corpus
        run: unzip -q rar-corpus.zip

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          java-package: 'jdk'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Regression test
        id: regression
        env:
          JUNRAR_REGRESSION_TEST_CORPUS_ROOT: '${{ github.workspace }}/rar-corpus/'
          JUNRAR_REGRESSION_TEST_CORPUS_DIR: '${{ github.workspace }}/rar-corpus/'
        run: ./gradlew regressionTest

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: regression-test-results
          path: build/test-results/
