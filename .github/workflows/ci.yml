name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - 'dependabot/**'
  workflow_dispatch:
    inputs:
      perform_release:
        description: 'Perform release'
        default: false
        type: boolean
      bump:
        description: 'Bump type'
        required: false
        default: 'next'
        type: choice
        options:
          - 'next'
          - 'major'
          - 'minor'
          - 'patch'
          - 'current'
      maven_publish:
        description: 'Push to Maven'
        default: true
        type: boolean

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    name: Test on ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          java-package: 'jdk'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Build
        run: ./gradlew build

      - name: Upload Unit Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-jdk-${{ matrix.os }}
          path: build/test-results/

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'
          check_name: 'JUnit Test Report: ${{ matrix.os }}'

      - name: Jacoco
        run: ./gradlew jacocoTestReport
      - uses: codecov/codecov-action@v7
        if: matrix.os == 'ubuntu-latest'

  regression:
    runs-on: ubuntu-latest
    name: Regression test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          java-package: 'jdk'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # The corpus ships in the repository as payload-stripped archives, so there is
      # nothing to download and nothing to configure. See CONTRIBUTING.md. Kept out of
      # `check` so the unit suite stays fast; one OS is enough for a pure-JVM parse.
      - name: Regression test
        run: ./gradlew regressionTest

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: regression-test-results
          path: build/test-results/

  # The regular build compiles with the JDK 21 toolchain and --release 8, which proves
  # API/bytecode compatibility only. This job builds the jar and the framework-free
  # smoke runner with an actual JDK 8 javac (Gradle itself cannot run on 8), and the
  # jre-smoke matrix below runs that genuinely JDK 8-built artifact on the base JRE 8
  # and the latest LTS. JUnit 5 cannot run on JRE 8 (manual §8.1), hence one
  # `public static void main` runner instead of the test suite.
  jdk8-build:
    runs-on: ubuntu-latest
    name: Build with a real JDK 8
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: '8'
          java-package: 'jdk'
          distribution: 'temurin'

      - name: Compile jar and smoke runner with javac 8
        run: |
          slf4j_version="$(grep -oE 'slf4j-api:[0-9]+\.[0-9]+\.[0-9]+' build.gradle | cut -d: -f2)"
          curl -fsSL --create-dirs -o build/slf4j-api.jar \
            "https://repo1.maven.org/maven2/org/slf4j/slf4j-api/${slf4j_version}/slf4j-api-${slf4j_version}.jar"
          find src/main/java -name '*.java' > build/sources.txt
          mkdir -p build/jdk8/classes build/jdk8/smoke
          javac -encoding UTF-8 -cp build/slf4j-api.jar -d build/jdk8/classes @build/sources.txt
          jar cf build/jdk8/junrar-jdk8.jar -C build/jdk8/classes .
          javac -encoding UTF-8 -cp build/jdk8/junrar-jdk8.jar -d build/jdk8/smoke \
            src/jre8smoke/java/com/github/junrar/jre8smoke/Jre8SmokeMain.java

      - name: Upload JDK 8 build
        uses: actions/upload-artifact@v7
        with:
          name: jdk8-build
          path: |
            build/jdk8/junrar-jdk8.jar
            build/jdk8/smoke
            build/slf4j-api.jar

  jre-smoke:
    needs: jdk8-build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '8', '25' ]
    name: JRE ${{ matrix.java }} runtime extraction smoke
    steps:
      # Checked out for the committed RAR fixtures the runner reads from src/test/resources.
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          java-package: 'jre'
          distribution: 'temurin'

      - name: Download JDK 8 build
        uses: actions/download-artifact@v8
        with:
          name: jdk8-build
          path: jdk8-artifact

      - name: Run extraction smoke on JRE ${{ matrix.java }}
        run: |
          java -version
          java -cp "jdk8-artifact/jdk8/smoke:jdk8-artifact/jdk8/junrar-jdk8.jar:jdk8-artifact/slf4j-api.jar" \
            com.github.junrar.jre8smoke.Jre8SmokeMain

  version:
    runs-on: macos-latest
    if: github.repository_owner == 'junrar' && github.ref == 'refs/heads/master'
    outputs:
      version_current: ${{ steps.versions.outputs.version_current }}
      version_next: ${{ steps.versions.outputs.version_next }}
      should_release: ${{ steps.versions.outputs.should_release }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
      - name: Install svu
        run: brew install --cask caarlos0/tap/svu
      - name: Compute next version for release
        if: inputs.perform_release
        run: |
          echo "VERSION_NEXT=`svu ${{ inputs.bump }}`" | tee -a $GITHUB_ENV
          echo "VERSION_NEXT_SUFFIX=`svu ${{ inputs.bump }}`" | tee -a $GITHUB_ENV
      - name: Compute next version for snapshot
        if: inputs.perform_release != true
        run: |
          echo "VERSION_NEXT=`svu ${{ inputs.bump || 'next' }}`" | tee -a $GITHUB_ENV
          echo "VERSION_NEXT_SUFFIX=`svu ${{ inputs.bump || 'next' }}`-SNAPSHOT" | tee -a $GITHUB_ENV
      - name: Set Versions
        id: versions
        run: |
          echo "version_current=`svu current`" >> $GITHUB_OUTPUT
          echo "version_next=${{ env.VERSION_NEXT_SUFFIX }}" >> $GITHUB_OUTPUT
          [[ `svu current` != ${{ env.VERSION_NEXT }} || "${{ inputs.perform_release }}" == 'true' ]] && echo "should_release=true" >> $GITHUB_OUTPUT || echo

  release:
    needs: [ version, test, regression ]
    runs-on: ubuntu-latest
    if: needs.version.outputs.should_release
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Display versions
        run: |
          echo "Current version: ${{ needs.version.outputs.version_current }}, should release: ${{ needs.version.outputs.version_next }}"
      - name: Update version in gradle.properties
        run: echo "version=${{ needs.version.outputs.version_next }}" > gradle.properties
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          java-package: 'jdk'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Maven publish
        if: inputs.maven_publish || github.event_name == 'push'
        env:
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_PASSPHRASE }}
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.MAVENCENTRAL_USER }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.MAVENCENTRAL_PASSWORD }}
        run: ./gradlew publishToSonatype closeAndReleaseSonatypeStagingRepository
      - name: JReleaser full release
        if: inputs.perform_release
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew --stacktrace jar jreleaserFullRelease
      - name: JReleaser release output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jreleaser-release
          path: |
            build/jreleaser/trace.log
            build/jreleaser/output.properties
      - name: Release commit and push
        uses: EndBug/add-and-commit@v10
        if: inputs.perform_release
        with:
          message: 'chore(release): ${{ needs.version.outputs.version_next }} [skip ci]'
          default_author: github_actions

